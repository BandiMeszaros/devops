services:
  tailscale-client:
    image: 'tailscale/tailscale:latest'
    hostname: '${TS_HOSTNAME:-coolify-ts}'
    environment:
      - 'TS_HOSTNAME=${TS_HOSTNAME:-coolify-ts}'
      - 'TS_AUTHKEY=${TS_AUTHKEY:?}'
      - 'TS_STATE_DIR=${TS_STATE_DIR:-/var/lib/tailscale}'
      - 'TS_USERSPACE=${TS_USERSPACE:-false}'
      - TS_SERVE_CONFIG=/var/lib/tailscale/serve.json
    volumes:
      - 'tailscale-client:/var/lib/tailscale'
    devices:
      - '/dev/net/tun:/dev/net/tun'
    cap_add:
      - net_admin
    networks:
      - coolify
      - hiym9vlva60bp7lduwfln4fj
      - ith13tgxvl3kh59c2v9qpnzb
    healthcheck:
      test:
        - CMD-SHELL
        - "tailscale status --json | grep -q 'BackendState'"
      interval: 10s
      timeout: 5s
      retries: 5
  nginx:
    image: 'nginx:latest'
    depends_on:
      - tailscale-client
    network_mode: 'service:tailscale-client'
    volumes:
      - 'tailscale-client:/var/lib/tailscale'
    entrypoint:
      - /bin/sh
      - '-c'
      - |
        cat << 'INNER_EOF' > /var/lib/tailscale/serve.json
        {
          "TCP": {
            "443": {
              "HTTPS": true
            }
          },
          "Web": {
            "$${TS_CERT_DOMAIN}:443": {
              "Handlers": {
                "/": {
                  "Proxy": "http://127.0.0.1:80"
                }
              }
            }
          }
        }
        INNER_EOF
        cat << 'INNER_EOF' > /etc/nginx/nginx.conf
        user nginx;
        worker_processes auto;
        error_log /var/log/nginx/error.log notice;
        pid /var/run/nginx.pid;
        events {
            worker_connections 1024;
        }
        http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;
            sendfile on;
            keepalive_timeout 65;

            server {
                listen 80;
                listen [::]:80;
                server_name localhost 127.0.0.1 ::1;
                location / {
                    return 200 'OK';
                    add_header Content-Type text/plain;
                }
            }

            server {
                listen 80 default_server;
                listen [::]:80 default_server;

                location /transmission/ {
                    proxy_pass http://transmission:9091/transmission/;
                    proxy_set_header Host $$host;
                    proxy_set_header X-Real-IP $$remote_addr;
                    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 600s;
                }

                location /filebrowser/ {
                    proxy_pass http://filebrowser:80/filebrowser/;
                    proxy_set_header Host $$host;
                    proxy_set_header X-Real-IP $$remote_addr;
                    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 600s;
                }

                location / {
                    proxy_pass http://coolify:8080;
                    proxy_set_header Host $$host;
                    proxy_set_header X-Real-IP $$remote_addr;
                    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 600s;
                }
            }
        }
        INNER_EOF
        exec nginx -g "daemon off;"
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:80/'
        - '-o'
        - /dev/null
      interval: 20s
      timeout: 5s
      retries: 3
networks:
  coolify:
    external: true
  hiym9vlva60bp7lduwfln4fj:
    external: true
  ith13tgxvl3kh59c2v9qpnzb:
    external: true
volumes:
  tailscale-client: null
